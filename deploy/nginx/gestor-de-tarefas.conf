# Nginx - Gestor de Tarefas (Debian)
# Colocar em: /etc/nginx/sites-available/gestor-de-tarefas
# Ativar: sudo ln -sf /etc/nginx/sites-available/gestor-de-tarefas.conf /etc/nginx/sites-enabled/
# Testar: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;  # substituir por seu domínio, ex: tarefas.empresa.com

# Frontend: pasta do build (se estiver em /home/portes, garantir permissão de leitura para www-data:
#   chmod 755 /home/portes /home/portes/gestor_tarefas /home/portes/gestor_tarefas/gestor_de_tarefas /home/portes/gestor_tarefas/gestor_de_tarefas/frontend /home/portes/gestor_tarefas/gestor_de_tarefas/frontend/dist)
    root /home/portes/gestor_tarefas/gestor_de_tarefas/frontend/dist;
    index index.html;

    # Logs
    access_log /var/log/nginx/gestor-de-tarefas-access.log;
    error_log  /var/log/nginx/gestor-de-tarefas-error.log;

    # API Backend (proxy para o Node)
    location /api {
        proxy_pass http://127.0.0.1:3031;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Frontend SPA (todos os caminhos não /api servem o index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets estáticos (JS/CSS com hash no nome)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
